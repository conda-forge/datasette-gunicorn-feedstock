{% set name = "datasette-gunicorn" %}
{% set version = "0.1.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/datasette-gunicorn-{{ version }}.tar.gz
  sha256: 3dabced1e00ed60e0cb85133f04836a355e9ce0ced9fc174a229b5deb27de27e

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 1

requirements:
  host:
    - python {{ python_min }}
    - pip
  run:
    - python >={{ python_min }}
    - datasette >0.63.2
    - gunicorn

test:
  imports:
    - datasette_gunicorn
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/simonw/datasette-gunicorn
  summary: Run a Datasette server using Gunicorn
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - rxm7706
